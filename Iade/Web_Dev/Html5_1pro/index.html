<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio de Serviços - Home</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        header {
            background-color: #333;
            color: white;
            padding: 20px;
            text-align: center;
        }
        nav {
            background-color: #555;
            padding: 10px;
            text-align: center;
        }
        nav a {
            text-decoration: none;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            color: #ffffff;
            text-transform: uppercase;
            background-color: #000000; /* Black */
            border: none;
            border-radius: 25px; /* Rounded corners */
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #333; /* Darker grey on hover */
        }
        section {
            padding: 20px;
            text-align: center;
        }
        marquee {
            display: inline-block;
            font-size: 18px;
            color: white;
            background-color: #333;
            padding: 10px;
            border-radius: 10px;
        }
        img {
            max-width: 100%;
            height: auto;
        }
        footer {
            background-color: #333;
            color: white;
            padding: 10px;
            text-align: center;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body bgcolor="#808080">
    <header>
        <h1>Portfólio de Serviços</h1>
    </header>
    <nav>
        <a href="index.html"><button>Home</button></a>
        <a href="sobre.html"><button>Sobre</button></a>
        <a href="contato.html"><button>Contato</button></a>
    </nav>
    <section>
        <marquee behavior="scroll" direction="left"><input type="text" id="Name" name="Name" placeholder="    Insert Funny Text Here"></marquee>
        <h2>Bem-vindo ao nosso site!</h2>
        <p>Explore nossos serviços para encontrar o que você precisa.</p>
        <img src="fast-cat-cat-excited.gif" alt="Cat GIF">
    </section>
    <footer>
        <p>&copy; 2024 Portfólio de Serviços</p>
    </footer>
</body>
</html>
